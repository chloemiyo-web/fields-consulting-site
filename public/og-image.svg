<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Fields Consulting OG image — placeholder branded card.
       Replace with a final designed PNG at /public/og-image.png and
       update lib/metadata.ts references when ready. -->
  <rect width="1200" height="630" fill="#0A0A0A"/>

  <!-- Hairline border inset -->
  <rect x="40" y="40" width="1120" height="550" fill="none" stroke="#F7F7F5" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Eyebrow -->
  <text x="80" y="120"
        font-family="ui-sans-serif, system-ui, sans-serif"
        font-size="18"
        font-weight="500"
        fill="#F7F7F5"
        fill-opacity="0.6"
        letter-spacing="3.6">CHILDCARE GROWTH ARCHITECTURE</text>

  <!-- Wordmark -->
  <text x="80" y="320"
        font-family="ui-serif, Georgia, serif"
        font-size="92"
        font-weight="500"
        fill="#F7F7F5"
        letter-spacing="-1">Fields</text>
  <text x="80" y="430"
        font-family="ui-serif, Georgia, serif"
        font-size="92"
        font-weight="500"
        fill="#F7F7F5"
        letter-spacing="-1">Consulting</text>

  <!-- Hairline divider -->
  <line x1="80" y1="490" x2="320" y2="490" stroke="#F7F7F5" stroke-opacity="0.4" stroke-width="1"/>

  <!-- Tagline -->
  <text x="80" y="540"
        font-family="ui-sans-serif, system-ui, sans-serif"
        font-size="24"
        font-weight="400"
        fill="#F7F7F5"
        fill-opacity="0.75">Strategic Operations &amp; Leadership Consulting</text>

  <!-- Bottom-right corner mark -->
  <text x="1120" y="555"
        font-family="ui-sans-serif, system-ui, sans-serif"
        font-size="14"
        font-weight="500"
        fill="#F7F7F5"
        fill-opacity="0.5"
        letter-spacing="2.4"
        text-anchor="end">FIELDSCONSULTING.COM</text>
</svg>
